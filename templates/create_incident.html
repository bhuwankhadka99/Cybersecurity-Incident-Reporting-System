<!DOCTYPE html>
<html>
<head>
    <title>Create Incident - CyberSafe</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f7fb;
            margin: 0;
        }

        .navbar {
            background: #0b1f3a;
            color: white;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .navbar h2 {
            margin: 0;
        }

        .navbar a {
            color: white;
            text-decoration: none;
            font-size: 15px;
        }

        .container {
            display: flex;
            justify-content: center;
            padding: 40px 20px;
        }

        .incident-card {
            background: white;
            width: 450px;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0px 5px 20px rgba(0,0,0,0.1);
        }

        .incident-card h1 {
            text-align: center;
            color: #0b1f3a;
            margin-bottom: 25px;
        }

        label {
            font-weight: bold;
            color: #333;
        }

        input, textarea, select {
            width: 100%;
            padding: 12px;
            margin-top: 8px;
            margin-bottom: 18px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 15px;
            box-sizing: border-box;
        }

        textarea {
            height: 120px;
            resize: none;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
        }

        .create-btn {
            background: #1565c0;
            color: white;
        }

        .create-btn:hover {
            background: #0d47a1;
        }

        .back-btn {
            margin-top: 15px;
            background: #555;
            color: white;
        }

        .back-btn:hover {
            background: #333;
        }

        #message {
            text-align: center;
            margin-top: 15px;
            font-weight: bold;
        }


        @media(max-width:600px){

            .incident-card {
                width: 100%;
            }

            .navbar {
                padding: 15px;
            }

        }

    </style>

</head>


<body>


<!-- Navigation Bar -->

<div class="navbar">

    <h2>🛡 CyberSafe</h2>

    <a href="/dashboard">
        Dashboard
    </a>

</div>



<div class="container">


<div class="incident-card">


<h1>Create Incident</h1>


<form id="incidentForm">


<label>Incident Title</label>

<input 
type="text" 
id="title" 
placeholder="Enter incident title"
required>



<label>Description</label>

<textarea 
id="description"
placeholder="Describe the incident"
required></textarea>



<label>Category ID</label>

<input 
type="number"
id="category_id"
placeholder="Enter category ID"
required>



<label>Severity Level</label>

<select id="severity">

<option value="Low">Low</option>

<option value="Medium">Medium</option>

<option value="High">High</option>

<option value="Critical">Critical</option>

</select>



<label>User ID</label>

<input 
type="number"
id="user_id"
placeholder="Enter user ID"
required>



<button 
type="submit" 
class="create-btn">

Create Incident

</button>


</form>


<p id="message"></p>


<button 
class="back-btn"
onclick="window.location.href='/dashboard'">

🔙 Back to Dashboard

</button>



</div>


</div>



<script src="{{ url_for('static', filename='js/incident.js') }}"></script>


</body>

</html>
